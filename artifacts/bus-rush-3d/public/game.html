<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bus Rush 3D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #7EC8E3; }
  #canvas-container { position: fixed; inset: 0; }
  canvas { display: block; width: 100% !important; height: 100% !important; }

  /* HUD */
  #hud { position: fixed; inset: 0; pointer-events: none; font-family: 'Segoe UI', Arial, sans-serif; }

  /* Top bar */
  #top-bar {
    position: absolute; top: 12px; left: 12px; right: 12px;
    display: flex; gap: 8px; align-items: stretch;
  }
  .hud-panel {
    background: rgba(20,23,26,0.82);
    border: 1px solid #FFB100;
    border-radius: 10px;
    padding: 8px 14px;
    backdrop-filter: blur(4px);
  }
  #score-panel { display: flex; flex-direction: column; align-items: center; min-width: 90px; }
  #score-label { font-size: 10px; color: #FFB100; letter-spacing: 1px; text-transform: uppercase; }
  #score-value { font-size: 26px; font-weight: 900; color: #FFD200; font-variant-numeric: tabular-nums; line-height: 1; }

  #pax-panel { display: flex; flex-direction: column; align-items: center; min-width: 80px; }
  #pax-label { font-size: 10px; color: #FFB100; letter-spacing: 1px; text-transform: uppercase; }
  #pax-value { font-size: 22px; font-weight: 700; color: #fff; font-variant-numeric: tabular-nums; line-height: 1; }

  #nav-panel { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  #nav-stop { font-size: 13px; font-weight: 700; color: #FFB100; }
  #nav-row { display: flex; align-items: center; gap: 6px; margin-top: 2px; }
  #nav-compass { font-size: 20px; transition: transform 0.15s; }
  #nav-dist { font-size: 12px; color: #ccc; }

  /* Stop dots */
  #stop-dots {
    position: absolute; top: 96px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 6px; align-items: center;
    background: rgba(20,23,26,0.75);
    border: 1px solid #FFB100;
    border-radius: 20px;
    padding: 6px 14px;
    backdrop-filter: blur(4px);
  }
  .stop-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #555; border: 1.5px solid #888;
    position: relative;
    transition: all 0.3s;
  }
  .stop-dot.active {
    background: #FFB100; border-color: #FFD200;
    box-shadow: 0 0 8px #FFB100;
    animation: pulse-dot 1s infinite;
  }
  .stop-dot.visited { background: #333; border-color: #FFB100; opacity: 0.55; }
  .stop-dot-label {
    position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
    font-size: 9px; color: #aaa; white-space: nowrap;
  }
  .stop-dot.active .stop-dot-label { color: #FFD200; }
  @keyframes pulse-dot {
    0%, 100% { box-shadow: 0 0 6px #FFB100; }
    50% { box-shadow: 0 0 14px #FFD200, 0 0 4px #fff; }
  }

  /* Speed */
  #speed-panel {
    position: absolute; bottom: 130px; right: 12px;
    display: flex; flex-direction: column; align-items: center;
    min-width: 80px;
  }
  #speed-value { font-size: 32px; font-weight: 900; color: #fff; font-variant-numeric: tabular-nums; line-height: 1; }
  #speed-unit { font-size: 11px; color: #FFB100; letter-spacing: 1px; }

  /* Toast */
  #toast-container {
    position: absolute; top: 140px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    pointer-events: none;
  }
  .toast {
    background: rgba(20,23,26,0.9);
    border: 1px solid #FFB100;
    border-radius: 20px;
    padding: 6px 18px;
    font-size: 13px; font-weight: 600; color: #FFD200;
    animation: toast-in 0.3s ease, toast-out 0.5s ease 1.5s forwards;
    backdrop-filter: blur(4px);
  }
  @keyframes toast-in { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: none; } }
  @keyframes toast-out { to { opacity: 0; transform: translateY(-8px); } }

  /* Controls */
  #controls {
    position: absolute; bottom: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: flex-end;
    padding: 12px 16px 20px;
    pointer-events: none;
  }
  #steer-group { display: flex; gap: 10px; pointer-events: all; }
  #throttle-group { display: flex; gap: 10px; pointer-events: all; }
  .ctrl-btn {
    width: 72px; height: 72px; border-radius: 14px;
    border: 2px solid rgba(255,177,0,0.5);
    background: rgba(20,23,26,0.8);
    color: #FFB100; font-size: 24px; font-weight: 900;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; user-select: none; touch-action: none;
    backdrop-filter: blur(4px);
    transition: background 0.1s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .ctrl-btn:active, .ctrl-btn.pressed {
    background: rgba(255,177,0,0.25);
    transform: scale(0.95);
  }
  #btn-gas { background: rgba(54,211,153,0.25); border-color: #36D399; color: #36D399; }
  #btn-gas.pressed { background: rgba(54,211,153,0.45); }
  #btn-brake { background: rgba(255,70,85,0.25); border-color: #FF4655; color: #FF4655; }
  #btn-brake.pressed { background: rgba(255,70,85,0.45); }

  /* Start overlay */
  #start-overlay {
    position: fixed; inset: 0;
    background: rgba(10,12,15,0.92);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 999;
    gap: 16px;
  }
  #start-title { font-size: 44px; font-weight: 900; color: #FFB100; letter-spacing: 2px; text-shadow: 0 0 30px #FFB10066; }
  #start-sub { font-size: 16px; color: #ccc; }
  #start-btn {
    margin-top: 10px;
    padding: 14px 48px;
    background: #FFB100; color: #14171A;
    border: none; border-radius: 40px;
    font-size: 20px; font-weight: 900; cursor: pointer;
    box-shadow: 0 0 30px #FFB10066;
    transition: transform 0.1s;
  }
  #start-btn:active { transform: scale(0.96); }
</style>
</head>
<body>
<div id="canvas-container"></div>

<!-- HUD -->
<div id="hud">
  <div id="top-bar">
    <div class="hud-panel" id="score-panel">
      <div id="score-label">$ EARNED</div>
      <div id="score-value">$0</div>
    </div>
    <div class="hud-panel" id="pax-panel">
      <div id="pax-label">ON BUS</div>
      <div id="pax-value">0/24</div>
    </div>
    <div class="hud-panel" id="nav-panel">
      <div id="nav-stop">→ STOP A</div>
      <div id="nav-row">
        <span id="nav-compass">↑</span>
        <span id="nav-dist">0 m</span>
      </div>
    </div>
  </div>

  <div id="stop-dots">
    <div style="font-size:10px;color:#FFB100;margin-right:4px;letter-spacing:1px;">ROUTE</div>
    <div class="stop-dot active" id="dot-0"><span class="stop-dot-label">A</span></div>
    <div style="width:18px;height:2px;background:#555;border-radius:2px;"></div>
    <div class="stop-dot" id="dot-1"><span class="stop-dot-label">B</span></div>
    <div style="width:18px;height:2px;background:#555;border-radius:2px;"></div>
    <div class="stop-dot" id="dot-2"><span class="stop-dot-label">C</span></div>
    <div style="width:18px;height:2px;background:#555;border-radius:2px;"></div>
    <div class="stop-dot" id="dot-3"><span class="stop-dot-label">D</span></div>
    <div style="width:18px;height:2px;background:#555;border-radius:2px;"></div>
    <div class="stop-dot" id="dot-4"><span class="stop-dot-label">E</span></div>
    <div style="width:18px;height:2px;background:#555;border-radius:2px;"></div>
    <div class="stop-dot" id="dot-5"><span class="stop-dot-label">F</span></div>
  </div>

  <div class="hud-panel" id="speed-panel">
    <div id="speed-value">0</div>
    <div id="speed-unit">KM/H</div>
  </div>

  <div id="toast-container"></div>

  <!-- Touch Controls -->
  <div id="controls">
    <div id="steer-group">
      <div class="ctrl-btn" id="btn-left">◀</div>
      <div class="ctrl-btn" id="btn-right">▶</div>
    </div>
    <div id="throttle-group">
      <div class="ctrl-btn" id="btn-gas">GAS</div>
      <div class="ctrl-btn" id="btn-brake">BRK</div>
    </div>
  </div>
</div>

<!-- Start Overlay -->
<div id="start-overlay">
  <div id="start-title">BUS RUSH 3D</div>
  <div id="start-sub">Pick up passengers · Complete the route · Earn money</div>
  <button id="start-btn">TAP TO START</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// =====================================================================
// BUS RUSH 3D — Complete Game
// =====================================================================

// ─── GLOBALS ────────────────────────────────────────────────────────
let scene, camera, renderer, clock;
let bus, busBody;
let buildings = [];
let stops = [];
let beaconMeshes = [];

// Physics state
let busPos = new THREE.Vector3(0, 0, 60);
let busAngle = 0; // radians, 0 = facing +Z? Let's say 0 = facing -Z (north)
let busSpeed = 0;         // units/sec
let busSteering = 0;

const MAX_SPEED = 22;       // units/sec (~80 km/h)
const ACCELERATION = 14;
const FRICTION = 8;
const BRAKE_FORCE = 22;
const STEER_RATE = 1.8;     // rad/s at full speed
const BUS_RADIUS = 4.5;     // bounding circle

// Camera
let camPos = new THREE.Vector3();
let camTarget = new THREE.Vector3();

// Controls
const keys = { gas: false, brake: false, left: false, right: false };

// Game state
let score = 0;
let passengers = 0;
const MAX_PAX = 24;
let targetStopIndex = 0;
let visitedStops = new Set();
let dockedTimer = 0;
const DOCK_TIME = 1.0;   // seconds at stop before boarding
let isDocked = false;
let gameStarted = false;

// Stop data
const stopNames = ['A', 'B', 'C', 'D', 'E', 'F'];
const stopPositions = [
  new THREE.Vector3(0,   0,  60),
  new THREE.Vector3(60,  0,  10),
  new THREE.Vector3(55,  0, -60),
  new THREE.Vector3(-5,  0, -65),
  new THREE.Vector3(-60, 0, -10),
  new THREE.Vector3(-60, 0,  55),
];

// Road grid bounds (for collision/boundary)
const WORLD_SIZE = 90;

// ─── SCENE SETUP ────────────────────────────────────────────────────
function initScene() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x7EC8E3);
  scene.fog = new THREE.Fog(0xDCEEF5, 80, 200);

  camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.5, 400);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.getElementById('canvas-container').appendChild(renderer.domElement);

  clock = new THREE.Clock();

  // Sky gradient via background
  scene.background = new THREE.Color(0xA8D8EA);

  // Lighting
  const ambient = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(ambient);

  const sun = new THREE.DirectionalLight(0xfff5d0, 1.2);
  sun.position.set(50, 100, 50);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  sun.shadow.camera.near = 1;
  sun.shadow.camera.far = 300;
  sun.shadow.camera.left = -120;
  sun.shadow.camera.right = 120;
  sun.shadow.camera.top = 120;
  sun.shadow.camera.bottom = -120;
  scene.add(sun);

  const fill = new THREE.DirectionalLight(0xd0e8ff, 0.4);
  fill.position.set(-30, 20, -30);
  scene.add(fill);
}

// ─── WORLD / CITY GENERATION ─────────────────────────────────────────
function buildWorld() {
  // Ground plane
  const groundGeo = new THREE.PlaneGeometry(400, 400);
  const groundMat = new THREE.MeshLambertMaterial({ color: 0x5a8c4c });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  // Road system — 3x3 block grid
  // Horizontal roads at z = -80, -30, 20, 70 (approx)
  // Vertical roads at x = -80, -30, 20, 70
  const ROAD_W = 13;
  const ROAD_COLOR = 0x333333;
  const roadMat = new THREE.MeshLambertMaterial({ color: ROAD_COLOR });

  // Road grid lines (x-axis: vertical roads, z-axis: horizontal roads)
  const roadXPositions = [-65, -10, 45];
  const roadZPositions = [-65, -10, 45];

  // Horizontal roads (along X axis)
  roadZPositions.forEach(z => {
    const geo = new THREE.PlaneGeometry(220, ROAD_W);
    const mesh = new THREE.Mesh(geo, roadMat);
    mesh.rotation.x = -Math.PI / 2;
    mesh.position.set(0, 0.01, z);
    mesh.receiveShadow = true;
    scene.add(mesh);
    // Dashes
    addLaneDashes(mesh, 'h', z);
  });

  // Vertical roads (along Z axis)
  roadXPositions.forEach(x => {
    const geo = new THREE.PlaneGeometry(ROAD_W, 220);
    const mesh = new THREE.Mesh(geo, roadMat);
    mesh.rotation.x = -Math.PI / 2;
    mesh.position.set(x, 0.01, 0);
    mesh.receiveShadow = true;
    scene.add(mesh);
    addLaneDashes(mesh, 'v', x);
  });

  // City blocks with buildings
  const blockCenters = [
    [-37.5, -37.5], [7.5, -37.5], [52.5, -37.5],
    [-37.5, 7.5],   [7.5, 7.5],   [52.5, 7.5],
    [-37.5, 52.5],  [7.5, 52.5],  [52.5, 52.5],
  ];

  const buildingColors = [
    0x8B9DC3, 0xC4A882, 0xA0A0A0, 0x7B9E87,
    0xC8B8A2, 0x9999BB, 0xB5A090, 0x88AACC, 0xAA9988
  ];

  blockCenters.forEach((center, ci) => {
    const [bx, bz] = center;
    const numBuildings = 3 + Math.floor(Math.random() * 4);
    const usedPositions = [];

    for (let i = 0; i < numBuildings; i++) {
      const w = 6 + Math.random() * 10;
      const d = 6 + Math.random() * 10;
      const h = 8 + Math.random() * 24;
      let px, pz, attempts = 0;
      do {
        px = bx + (Math.random() - 0.5) * 22;
        pz = bz + (Math.random() - 0.5) * 22;
        attempts++;
      } while (attempts < 20 && usedPositions.some(u =>
        Math.abs(u.x - px) < (u.w + w) / 2 + 2 &&
        Math.abs(u.z - pz) < (u.d + d) / 2 + 2
      ));
      usedPositions.push({ x: px, z: pz, w, d });

      const color = buildingColors[(ci + i * 3) % buildingColors.length];
      addBuilding(px, h / 2, pz, w, h, d, color);
    }

    // Trees in block corners
    for (let t = 0; t < 2; t++) {
      const tx = bx + (Math.random() - 0.5) * 18;
      const tz = bz + (Math.random() - 0.5) * 18;
      addTree(tx, tz);
    }
  });

  // Streetlights along roads
  const lightPositions = [
    [-65, 20], [-65, -35], [-10, 20], [-10, -35], [45, 20], [45, -35],
    [-35, 45], [10, 45], [-35, -10], [10, -10]
  ];
  lightPositions.forEach(([x, z]) => addStreetLight(x, z));

  // Boundary walls (invisible)
  const wallMat = new THREE.MeshBasicMaterial({ visible: false });
  const wallH = 20;
  [
    [0, wallH/2, WORLD_SIZE+5,  200, wallH, 2],
    [0, wallH/2, -WORLD_SIZE-5, 200, wallH, 2],
    [WORLD_SIZE+5,  wallH/2, 0, 2, wallH, 200],
    [-WORLD_SIZE-5, wallH/2, 0, 2, wallH, 200],
  ].forEach(([x, y, z, w, h, d]) => {
    const wall = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMat);
    wall.position.set(x, y, z);
    scene.add(wall);
  });
}

function addLaneDashes(roadMesh, dir, pos) {
  const dashMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
  const numDashes = 15;
  for (let i = 0; i < numDashes; i++) {
    const geo = new THREE.PlaneGeometry(dir === 'h' ? 4 : 0.3, dir === 'h' ? 0.3 : 4);
    const dash = new THREE.Mesh(geo, dashMat);
    dash.rotation.x = -Math.PI / 2;
    if (dir === 'h') {
      dash.position.set(-70 + i * 10, 0.02, pos);
    } else {
      dash.position.set(pos, 0.02, -70 + i * 10);
    }
    scene.add(dash);
  }
}

function addBuilding(x, y, z, w, h, d, color) {
  const geo = new THREE.BoxGeometry(w, h, d);
  const mat = new THREE.MeshLambertMaterial({ color });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, y, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);

  // Windows (simple dark rows)
  const winMat = new THREE.MeshBasicMaterial({ color: 0x223344 });
  const floors = Math.floor(h / 4);
  for (let f = 1; f < floors; f++) {
    for (let side = 0; side < 4; side++) {
      const wGeo = new THREE.PlaneGeometry(w * 0.4, 1.2);
      const win = new THREE.Mesh(wGeo, winMat);
      win.position.set(x, f * 4 - h / 2 + 2, z);
      if (side === 0) { win.position.z = z + d / 2 + 0.05; }
      else if (side === 1) { win.position.z = z - d / 2 - 0.05; win.rotation.y = Math.PI; }
      else if (side === 2) { win.position.x = x + w / 2 + 0.05; win.rotation.y = Math.PI / 2; }
      else { win.position.x = x - w / 2 - 0.05; win.rotation.y = -Math.PI / 2; }
      scene.add(win);
    }
  }

  // Store for collision
  buildings.push({ x, z, hw: w / 2 + 1, hd: d / 2 + 1 });
}

function addTree(x, z) {
  const trunkMat = new THREE.MeshLambertMaterial({ color: 0x5C3A1E });
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.5, 3, 6), trunkMat);
  trunk.position.set(x, 1.5, z);
  trunk.castShadow = true;
  scene.add(trunk);

  const foliageMat = new THREE.MeshLambertMaterial({ color: 0x2D6A4F });
  const foliage = new THREE.Mesh(new THREE.ConeGeometry(2.5, 5, 7), foliageMat);
  foliage.position.set(x, 5.5, z);
  foliage.castShadow = true;
  scene.add(foliage);
}

function addStreetLight(x, z) {
  const poleMat = new THREE.MeshLambertMaterial({ color: 0x888888 });
  const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.18, 7, 6), poleMat);
  pole.position.set(x, 3.5, z);
  scene.add(pole);

  const headMat = new THREE.MeshLambertMaterial({ color: 0xEEDD88 });
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.4, 2), headMat);
  head.position.set(x, 7.3, z);
  scene.add(head);
}

// ─── BUS MODEL ───────────────────────────────────────────────────────
function buildBus() {
  bus = new THREE.Group();

  const AMBER = 0xFFB100;
  const WHITE = 0xEEEEEE;
  const DARK  = 0x222222;
  const GLASS = 0x335566;
  const WHEEL_COL = 0x111111;
  const HUB   = 0x888888;

  // Chassis/body
  const bodyGeo = new THREE.BoxGeometry(4, 3, 10);
  const bodyMat = new THREE.MeshLambertMaterial({ color: AMBER });
  busBody = new THREE.Mesh(bodyGeo, bodyMat);
  busBody.position.y = 2.2;
  busBody.castShadow = true;
  bus.add(busBody);

  // White stripe
  const stripeMat = new THREE.MeshLambertMaterial({ color: WHITE });
  const stripe = new THREE.Mesh(new THREE.BoxGeometry(4.02, 0.5, 10.02), stripeMat);
  stripe.position.set(0, 2.6, 0);
  bus.add(stripe);

  // Roof
  const roofMat = new THREE.MeshLambertMaterial({ color: WHITE });
  const roof = new THREE.Mesh(new THREE.BoxGeometry(3.8, 0.4, 9.8), roofMat);
  roof.position.set(0, 3.8, 0);
  bus.add(roof);

  // Windows — front
  const winMat = new THREE.MeshLambertMaterial({ color: GLASS, transparent: true, opacity: 0.7 });
  const frontWin = new THREE.Mesh(new THREE.BoxGeometry(3, 1.4, 0.1), winMat);
  frontWin.position.set(0, 2.5, -5.05);
  bus.add(frontWin);

  // Windows — side (multiple)
  for (let s = 0; s < 2; s++) {
    const sx = s === 0 ? 2.05 : -2.05;
    for (let w = 0; w < 3; w++) {
      const sideWin = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1.2, 1.8), winMat);
      sideWin.position.set(sx, 2.5, -3 + w * 2.4);
      bus.add(sideWin);
    }
  }

  // Door (right side, front area)
  const doorMat = new THREE.MeshLambertMaterial({ color: DARK });
  const door = new THREE.Mesh(new THREE.BoxGeometry(0.1, 2.4, 1.5), doorMat);
  door.position.set(2.06, 1.4, -3.5);
  bus.add(door);

  // Headlights
  const lightMat = new THREE.MeshBasicMaterial({ color: 0xFFFFCC });
  [-1, 1].forEach(side => {
    const hl = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.4, 0.15), lightMat);
    hl.position.set(side * 1.4, 1.8, -5.1);
    bus.add(hl);
  });

  // Taillights
  const tailMat = new THREE.MeshBasicMaterial({ color: 0xFF2200 });
  [-1, 1].forEach(side => {
    const tl = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.4, 0.15), tailMat);
    tl.position.set(side * 1.4, 1.8, 5.1);
    bus.add(tl);
  });

  // Wheels
  const wheelMat = new THREE.MeshLambertMaterial({ color: WHEEL_COL });
  const hubMat  = new THREE.MeshLambertMaterial({ color: HUB });
  const wheelPositions = [
    [-2.3, 0.65,  3.5],
    [ 2.3, 0.65,  3.5],
    [-2.3, 0.65, -3.5],
    [ 2.3, 0.65, -3.5],
  ];
  wheelPositions.forEach(([wx, wy, wz]) => {
    const wheel = new THREE.Mesh(new THREE.CylinderGeometry(0.65, 0.65, 0.6, 12), wheelMat);
    wheel.rotation.z = Math.PI / 2;
    wheel.position.set(wx, wy, wz);
    wheel.castShadow = true;
    bus.add(wheel);
    const hub = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.25, 0.65, 6), hubMat);
    hub.rotation.z = Math.PI / 2;
    hub.position.set(wx, wy, wz);
    bus.add(hub);
  });

  // Undercarriage
  const underMat = new THREE.MeshLambertMaterial({ color: DARK });
  const under = new THREE.Mesh(new THREE.BoxGeometry(3.6, 0.4, 9), underMat);
  under.position.set(0, 0.5, 0);
  bus.add(under);

  bus.position.copy(busPos);
  scene.add(bus);
}

// ─── BUS STOPS ───────────────────────────────────────────────────────
function buildStops() {
  stopPositions.forEach((pos, i) => {
    const stopGroup = new THREE.Group();

    // Ground zone rectangle
    const zoneMat = new THREE.MeshBasicMaterial({ color: 0xFFB100, transparent: true, opacity: 0.35 });
    const zone = new THREE.Mesh(new THREE.PlaneGeometry(6, 12), zoneMat);
    zone.rotation.x = -Math.PI / 2;
    zone.position.y = 0.05;
    stopGroup.add(zone);

    // Pole
    const poleMat = new THREE.MeshLambertMaterial({ color: 0x444455 });
    const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 5, 8), poleMat);
    pole.position.y = 2.5;
    stopGroup.add(pole);

    // Sign board
    const signMat = new THREE.MeshLambertMaterial({ color: 0xFFB100 });
    const sign = new THREE.Mesh(new THREE.BoxGeometry(2.5, 1.2, 0.15), signMat);
    sign.position.set(0, 5.2, 0);
    stopGroup.add(sign);

    // Beacon (glowing ring above)
    const beaconGeo = new THREE.TorusGeometry(1.5, 0.15, 8, 20);
    const beaconMat = new THREE.MeshBasicMaterial({ color: 0xFFD200, transparent: true, opacity: 0.9 });
    const beacon = new THREE.Mesh(beaconGeo, beaconMat);
    beacon.position.y = 10;
    beacon.rotation.x = Math.PI / 2;
    stopGroup.add(beacon);
    beaconMeshes.push(beacon);

    // Beacon vertical shaft
    const shaftMat = new THREE.MeshBasicMaterial({ color: 0xFFD200, transparent: true, opacity: 0.25 });
    const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 8, 6), shaftMat);
    shaft.position.y = 6;
    stopGroup.add(shaft);

    // Waiting passengers (little figures)
    const waitCount = 2 + Math.floor(Math.random() * 4);
    for (let w = 0; w < waitCount; w++) {
      const figMat = new THREE.MeshLambertMaterial({ color: [0x335588, 0x883333, 0x338855, 0x886633][w % 4] });
      const body = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1.2, 0.4), figMat);
      body.position.set(-2 + w * 0.8, 0.6, -1.5);
      stopGroup.add(body);
      const headMat = new THREE.MeshLambertMaterial({ color: 0xDEB887 });
      const head = new THREE.Mesh(new THREE.SphereGeometry(0.25, 6, 6), headMat);
      head.position.set(-2 + w * 0.8, 1.45, -1.5);
      stopGroup.add(head);
    }

    stopGroup.position.copy(pos);
    scene.add(stopGroup);
    stops.push({ pos, index: i, beacon, beaconMat });
  });

  updateStopBeacons();
}

function updateStopBeacons() {
  stops.forEach((stop, i) => {
    if (i === targetStopIndex) {
      stop.beaconMat.color.set(0xFFD200);
      stop.beaconMat.opacity = 0.95;
    } else {
      stop.beaconMat.color.set(0x444444);
      stop.beaconMat.opacity = 0.15;
    }
  });
}

// ─── CONTROLS ────────────────────────────────────────────────────────
function initControls() {
  // Keyboard
  window.addEventListener('keydown', e => {
    switch(e.code) {
      case 'ArrowUp': case 'KeyW': keys.gas = true; break;
      case 'ArrowDown': case 'KeyS': keys.brake = true; break;
      case 'ArrowLeft': case 'KeyA': keys.left = true; break;
      case 'ArrowRight': case 'KeyD': keys.right = true; break;
    }
  });
  window.addEventListener('keyup', e => {
    switch(e.code) {
      case 'ArrowUp': case 'KeyW': keys.gas = false; break;
      case 'ArrowDown': case 'KeyS': keys.brake = false; break;
      case 'ArrowLeft': case 'KeyA': keys.left = false; break;
      case 'ArrowRight': case 'KeyD': keys.right = false; break;
    }
  });

  // Touch buttons
  const btnMap = {
    'btn-left':  'left',
    'btn-right': 'right',
    'btn-gas':   'gas',
    'btn-brake': 'brake',
  };

  Object.entries(btnMap).forEach(([id, key]) => {
    const el = document.getElementById(id);
    el.addEventListener('touchstart', e => { e.preventDefault(); keys[key] = true; el.classList.add('pressed'); }, { passive: false });
    el.addEventListener('touchend', e => { e.preventDefault(); keys[key] = false; el.classList.remove('pressed'); }, { passive: false });
    el.addEventListener('touchcancel', e => { e.preventDefault(); keys[key] = false; el.classList.remove('pressed'); }, { passive: false });
    el.addEventListener('mousedown', e => { e.preventDefault(); keys[key] = true; el.classList.add('pressed'); });
    el.addEventListener('mouseup', e => { e.preventDefault(); keys[key] = false; el.classList.remove('pressed'); });
    el.addEventListener('mouseleave', () => { keys[key] = false; el.classList.remove('pressed'); });
  });

  // Prevent default touch behavior
  document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
}

// ─── PHYSICS / CONTROLS UPDATE ───────────────────────────────────────
function updateBus(dt) {
  // Steering — proportional to speed
  const steerStrength = STEER_RATE * Math.min(Math.abs(busSpeed) / MAX_SPEED * 2 + 0.3, 1);
  if (keys.left)  busAngle -= steerStrength * dt;
  if (keys.right) busAngle += steerStrength * dt;

  // Acceleration / braking
  const dir = Math.sign(busSpeed) || 1;
  if (keys.gas) {
    busSpeed += ACCELERATION * dt;
    if (busSpeed > MAX_SPEED) busSpeed = MAX_SPEED;
  } else if (keys.brake) {
    if (busSpeed > 0.2) {
      busSpeed -= BRAKE_FORCE * dt;
    } else if (busSpeed > -MAX_SPEED * 0.3) {
      busSpeed -= (BRAKE_FORCE * 0.4) * dt; // slow reverse
    }
  } else {
    // Friction
    if (Math.abs(busSpeed) < 0.2) busSpeed = 0;
    else busSpeed -= FRICTION * Math.sign(busSpeed) * dt;
  }

  // Move
  const forwardX = Math.sin(busAngle);
  const forwardZ = Math.cos(busAngle);

  const newX = busPos.x + forwardX * busSpeed * dt;
  const newZ = busPos.z + forwardZ * busSpeed * dt;

  // Boundary collision
  const clamped = new THREE.Vector3(
    Math.max(-WORLD_SIZE, Math.min(WORLD_SIZE, newX)),
    0,
    Math.max(-WORLD_SIZE, Math.min(WORLD_SIZE, newZ))
  );
  if (clamped.x !== newX || clamped.z !== newZ) busSpeed *= -0.3;

  // Building collision
  let blocked = false;
  for (const b of buildings) {
    const dx = clamped.x - b.x;
    const dz = clamped.z - b.z;
    if (Math.abs(dx) < b.hw + BUS_RADIUS && Math.abs(dz) < b.hd + BUS_RADIUS) {
      // Push out
      const overlapX = (b.hw + BUS_RADIUS) - Math.abs(dx);
      const overlapZ = (b.hd + BUS_RADIUS) - Math.abs(dz);
      if (overlapX < overlapZ) {
        clamped.x = b.x + (b.hw + BUS_RADIUS) * Math.sign(dx);
      } else {
        clamped.z = b.z + (b.hd + BUS_RADIUS) * Math.sign(dz);
      }
      busSpeed *= 0.1;
      blocked = true;
      break;
    }
  }

  busPos.copy(clamped);

  // Update bus mesh
  bus.position.set(busPos.x, 0, busPos.z);
  bus.rotation.y = -busAngle;

  // Spin wheels proportional to speed
  bus.children.forEach(c => {
    if (c.geometry && c.geometry.type === 'CylinderGeometry' && c.position.y < 1) {
      c.rotation.x += busSpeed * dt * 1.5;
    }
  });
}

// ─── CAMERA UPDATE ───────────────────────────────────────────────────
function updateCamera(dt) {
  const FOLLOW_DIST = 18;
  const FOLLOW_HEIGHT = 8;

  const targetX = busPos.x - Math.sin(busAngle) * FOLLOW_DIST;
  const targetZ = busPos.z - Math.cos(busAngle) * FOLLOW_DIST;
  const targetY = FOLLOW_HEIGHT;

  camPos.x += (targetX - camPos.x) * Math.min(dt * 6, 1);
  camPos.y += (targetY - camPos.y) * Math.min(dt * 6, 1);
  camPos.z += (targetZ - camPos.z) * Math.min(dt * 6, 1);

  const lookX = busPos.x + Math.sin(busAngle) * 5;
  const lookZ = busPos.z + Math.cos(busAngle) * 5;
  camTarget.x += (lookX - camTarget.x) * Math.min(dt * 8, 1);
  camTarget.y += (1.5 - camTarget.y) * Math.min(dt * 8, 1);
  camTarget.z += (lookZ - camTarget.z) * Math.min(dt * 8, 1);

  camera.position.copy(camPos);
  camera.lookAt(camTarget);
}

// ─── GAME LOGIC (STOPS / PASSENGERS / SCORING) ───────────────────────
let beaconTime = 0;

function updateGameLogic(dt) {
  beaconTime += dt;

  // Animate beacons
  stops.forEach((stop, i) => {
    stop.beacon.position.y = 10 + Math.sin(beaconTime * 2 + i) * 0.5;
    stop.beacon.rotation.z = beaconTime * 1.5;
    if (i === targetStopIndex) {
      stop.beaconMat.opacity = 0.7 + Math.sin(beaconTime * 4) * 0.25;
    }
  });

  // Check proximity to target stop
  const target = stops[targetStopIndex];
  const dx = busPos.x - target.pos.x;
  const dz = busPos.z - target.pos.z;
  const dist = Math.sqrt(dx * dx + dz * dz);

  if (dist < 10 && Math.abs(busSpeed) < 3) {
    dockedTimer += dt;
    if (dockedTimer >= DOCK_TIME && !isDocked) {
      isDocked = true;
      dockAtStop();
    }
  } else {
    dockedTimer = 0;
    isDocked = false;
  }
}

function dockAtStop() {
  const stopName = stopNames[targetStopIndex];

  // Drop off passengers
  if (passengers > 0) {
    const dropOff = Math.ceil(passengers * (0.4 + Math.random() * 0.4));
    const earned = dropOff * 5;
    score += earned;
    passengers -= dropOff;
    if (passengers < 0) passengers = 0;
    showToast(`+${dropOff} passengers dropped off · +$${earned} earned`);
  }

  // Pick up new passengers
  setTimeout(() => {
    const available = MAX_PAX - passengers;
    const boarding = Math.min(Math.floor(2 + Math.random() * 6), available);
    if (boarding > 0) {
      passengers += boarding;
      showToast(`+${boarding} passengers boarded`);
    }

    // Mark visited and advance
    visitedStops.add(targetStopIndex);
    if (visitedStops.size === 6) visitedStops = new Set([targetStopIndex]);
    targetStopIndex = (targetStopIndex + 1) % 6;
    updateStopBeacons();
    updateStopDots();
    isDocked = false;
    dockedTimer = 0;
  }, 800);
}

// ─── HUD UPDATE ──────────────────────────────────────────────────────
function updateHUD() {
  // Score
  document.getElementById('score-value').textContent = '$' + score;
  // Passengers
  document.getElementById('pax-value').textContent = passengers + '/24';
  // Speed
  const kmh = Math.abs(Math.round(busSpeed * 3.6));
  document.getElementById('speed-value').textContent = kmh;

  // Nav: target stop + compass + distance
  const target = stops[targetStopIndex];
  const dx = target.pos.x - busPos.x;
  const dz = target.pos.z - busPos.z;
  const dist = Math.round(Math.sqrt(dx * dx + dz * dz));

  document.getElementById('nav-stop').textContent = '→ STOP ' + stopNames[targetStopIndex];
  document.getElementById('nav-dist').textContent = dist + ' m';

  // Compass angle
  const worldAngle = Math.atan2(dx, dz); // angle to target in world
  const relAngle = worldAngle - busAngle; // relative to bus heading
  const compassDeg = relAngle * 180 / Math.PI;
  document.getElementById('nav-compass').style.transform = `rotate(${compassDeg}deg)`;
}

function updateStopDots() {
  for (let i = 0; i < 6; i++) {
    const dot = document.getElementById('dot-' + i);
    dot.classList.remove('active', 'visited');
    if (i === targetStopIndex) dot.classList.add('active');
    else if (visitedStops.has(i)) dot.classList.add('visited');
  }
}

// ─── TOAST ───────────────────────────────────────────────────────────
function showToast(msg) {
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 2100);
}

// ─── RESIZE ──────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── GAME LOOP ───────────────────────────────────────────────────────
function gameLoop() {
  requestAnimationFrame(gameLoop);
  if (!gameStarted) return;

  const dt = Math.min(clock.getDelta(), 0.05);

  updateBus(dt);
  updateCamera(dt);
  updateGameLogic(dt);
  updateHUD();

  renderer.render(scene, camera);
}

// ─── START ───────────────────────────────────────────────────────────
function startGame() {
  document.getElementById('start-overlay').style.display = 'none';
  gameStarted = true;
  clock.start();

  // Init camera at a good starting position
  camPos.set(
    busPos.x - Math.sin(busAngle) * 18,
    8,
    busPos.z - Math.cos(busAngle) * 18
  );
  camTarget.copy(busPos);

  showToast('Drive to Stop A to begin!');
}

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('start-overlay').addEventListener('touchend', e => {
  if (e.target === document.getElementById('start-btn') ||
      e.target === document.getElementById('start-overlay')) startGame();
});

// Init everything
initScene();
buildWorld();
buildBus();
buildStops();
initControls();
gameLoop();
</script>
