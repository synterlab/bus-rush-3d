<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d1117">
<title>Bus Rush 3D</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;height:100%;overflow:hidden;background:#0a1628;touch-action:none}
  #c{position:fixed;inset:0;display:block}

  /* ── HUD ── */
  #hud{position:fixed;inset:0;pointer-events:none;
       font-family:'Segoe UI',system-ui,sans-serif;
       --amber:#FFB100;--gold:#FFD200;--green:#36D399;--red:#FF4655;
       --panel:rgba(8,12,20,0.78);--border:rgba(255,177,0,0.45)}

  /* Top bar */
  #top{position:absolute;top:max(12px,env(safe-area-inset-top,12px));
       left:12px;right:12px;display:flex;gap:8px;align-items:stretch}
  .panel{background:var(--panel);border:1px solid var(--border);
         border-radius:12px;padding:7px 12px;
         backdrop-filter:blur(12px) saturate(180%);
         -webkit-backdrop-filter:blur(12px) saturate(180%)}
  #sc{display:flex;flex-direction:column;align-items:center;min-width:82px}
  #sc-l{font-size:9px;color:var(--amber);letter-spacing:1.2px;text-transform:uppercase;opacity:.8}
  #sc-v{font-size:24px;font-weight:900;color:var(--gold);font-variant-numeric:tabular-nums;line-height:1.1}
  #px{display:flex;flex-direction:column;align-items:center;min-width:72px}
  #px-l{font-size:9px;color:var(--amber);letter-spacing:1.2px;text-transform:uppercase;opacity:.8}
  #px-v{font-size:20px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums;line-height:1.1}
  #nav{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
  #nav-s{font-size:12px;font-weight:700;color:var(--amber);letter-spacing:.5px}
  #nav-r{display:flex;align-items:center;gap:5px;margin-top:1px}
  #nav-c{font-size:18px;display:inline-block;transition:transform .12s}
  #nav-d{font-size:11px;color:#aab}

  /* Route dots */
  #dots{position:absolute;top:88px;left:50%;transform:translateX(-50%);
        display:flex;gap:5px;align-items:center;white-space:nowrap;
        background:var(--panel);border:1px solid var(--border);
        border-radius:20px;padding:5px 12px;
        backdrop-filter:blur(12px) saturate(180%);
        -webkit-backdrop-filter:blur(12px) saturate(180%)}
  .route-lbl{font-size:9px;color:var(--amber);margin-right:4px;letter-spacing:1px}
  .seg{width:14px;height:2px;background:#333;border-radius:2px}
  .dot{width:10px;height:10px;border-radius:50%;background:#333;
       border:1.5px solid #555;position:relative;flex-shrink:0;transition:all .3s}
  .dot.active{background:var(--amber);border-color:var(--gold);
              box-shadow:0 0 10px var(--amber);animation:dp 1s infinite}
  .dot.done{background:#222;border-color:var(--amber);opacity:.5}
  .dot-l{position:absolute;top:13px;left:50%;transform:translateX(-50%);
          font-size:8px;color:#888;white-space:nowrap}
  .dot.active .dot-l{color:var(--gold)}
  @keyframes dp{0%,100%{box-shadow:0 0 6px var(--amber)}50%{box-shadow:0 0 16px var(--gold),0 0 4px #fff}}

  /* Speedo */
  #spd{position:absolute;right:12px;
       bottom:calc(max(16px,env(safe-area-inset-bottom,16px)) + 164px);
       display:flex;flex-direction:column;align-items:center;min-width:76px}
  #spd-v{font-size:34px;font-weight:900;color:#fff;font-variant-numeric:tabular-nums;line-height:1}
  #spd-u{font-size:10px;color:var(--amber);letter-spacing:1.5px;margin-top:1px}

  /* Docked flash */
  #dock-ring{position:absolute;inset:0;pointer-events:none;
             border:3px solid var(--green);border-radius:0;opacity:0;transition:opacity .3s}

  /* Toast */
  #toast{position:absolute;top:134px;left:50%;transform:translateX(-50%);
         display:flex;flex-direction:column;align-items:center;gap:5px;pointer-events:none}
  .t{background:var(--panel);border:1px solid var(--border);border-radius:24px;
     padding:6px 18px;font-size:13px;font-weight:600;color:var(--gold);
     white-space:nowrap;backdrop-filter:blur(8px);
     animation:ti .25s ease,to .4s ease 1.6s forwards}
  @keyframes ti{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
  @keyframes to{to{opacity:0;transform:translateY(-6px)}}

  /* ── Controls — mobile-first ── */
  #ctrl{position:absolute;bottom:0;left:0;right:0;
        padding:0 16px calc(max(20px,env(safe-area-inset-bottom,20px)) + 4px);
        display:flex;justify-content:space-between;align-items:flex-end;
        pointer-events:none}
  .cg{display:flex;gap:10px;pointer-events:all}
  .btn{width:74px;height:74px;border-radius:16px;
       border:1.5px solid rgba(255,177,0,.4);
       background:rgba(8,12,20,.75);
       color:var(--amber);font-size:26px;font-weight:900;
       display:flex;align-items:center;justify-content:center;
       cursor:pointer;user-select:none;touch-action:none;
       backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
       transition:background .08s,transform .08s,box-shadow .08s;
       box-shadow:0 2px 12px rgba(0,0,0,.5)}
  .btn.p,.btn:active{background:rgba(255,177,0,.18);transform:scale(.93);
                     box-shadow:0 0 16px rgba(255,177,0,.3)}
  #bg{background:rgba(54,211,153,.12);border-color:#36D399;color:#36D399}
  #bg.p{background:rgba(54,211,153,.3);box-shadow:0 0 18px rgba(54,211,153,.4)}
  #bb{background:rgba(255,70,85,.12);border-color:#FF4655;color:#FF4655}
  #bb.p{background:rgba(255,70,85,.3);box-shadow:0 0 18px rgba(255,70,85,.4)}
  /* Extra wide hit areas on mobile */
  @media(max-width:480px){
    .btn{width:80px;height:80px;font-size:28px}
    #sc-v{font-size:22px}
    #px-v{font-size:18px}
  }

  /* ── Start overlay ── */
  #ov{position:fixed;inset:0;z-index:999;
      background:linear-gradient(160deg,#060c18 0%,#0d1f3a 50%,#0a1020 100%);
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
      padding:24px}
  .ov-badge{font-size:11px;letter-spacing:3px;color:var(--amber);opacity:.7;text-transform:uppercase}
  .ov-title{font-size:clamp(38px,10vw,58px);font-weight:900;color:var(--gold);
            letter-spacing:2px;text-shadow:0 0 40px rgba(255,177,0,.5),0 0 80px rgba(255,177,0,.2);
            text-align:center;line-height:1}
  .ov-sub{font-size:14px;color:#8899aa;text-align:center;max-width:280px;line-height:1.5}
  .ov-keys{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:4px}
  .ov-key{background:rgba(255,177,0,.1);border:1px solid rgba(255,177,0,.3);
          border-radius:6px;padding:4px 10px;font-size:11px;color:var(--amber)}
  #start{margin-top:8px;padding:16px 52px;background:var(--amber);color:#080c14;
         border:none;border-radius:40px;font-size:20px;font-weight:900;cursor:pointer;
         box-shadow:0 0 40px rgba(255,177,0,.5),0 4px 20px rgba(0,0,0,.5);
         transition:transform .1s,box-shadow .1s;letter-spacing:.5px}
  #start:active{transform:scale(.96);box-shadow:0 0 20px rgba(255,177,0,.3)}
</style>
</head>
<body>
<canvas id="c"></canvas>

<!-- HUD -->
<div id="hud">
  <div id="top">
    <div class="panel" id="sc"><div id="sc-l">EARNED</div><div id="sc-v">$0</div></div>
    <div class="panel" id="px"><div id="px-l">ON BUS</div><div id="px-v">0/24</div></div>
    <div class="panel" id="nav">
      <div id="nav-s">→ STOP A</div>
      <div id="nav-r"><span id="nav-c">▲</span><span id="nav-d">0 m</span></div>
    </div>
  </div>

  <div id="dots">
    <span class="route-lbl">ROUTE</span>
    <div class="dot active" id="d0"><span class="dot-l">A</span></div>
    <div class="seg"></div>
    <div class="dot" id="d1"><span class="dot-l">B</span></div>
    <div class="seg"></div>
    <div class="dot" id="d2"><span class="dot-l">C</span></div>
    <div class="seg"></div>
    <div class="dot" id="d3"><span class="dot-l">D</span></div>
    <div class="seg"></div>
    <div class="dot" id="d4"><span class="dot-l">E</span></div>
    <div class="seg"></div>
    <div class="dot" id="d5"><span class="dot-l">F</span></div>
  </div>

  <div class="panel" id="spd">
    <div id="spd-v">0</div><div id="spd-u">KM/H</div>
  </div>

  <div id="dock-ring"></div>
  <div id="toast"></div>

  <!-- Controls -->
  <div id="ctrl">
    <div class="cg">
      <div class="btn" id="bl">◀</div>
      <div class="btn" id="br">▶</div>
    </div>
    <div class="cg">
      <div class="btn" id="bg">GAS</div>
      <div class="btn" id="bb">BRK</div>
    </div>
  </div>
</div>

<!-- Start overlay -->
<div id="ov">
  <div class="ov-badge">🚌 3D City Simulator</div>
  <div class="ov-title">BUS RUSH 3D</div>
  <div class="ov-sub">Pick up passengers · Complete the route · Earn money</div>
  <div class="ov-keys">
    <span class="ov-key">W / ↑ Gas</span>
    <span class="ov-key">S / ↓ Brake</span>
    <span class="ov-key">A D / ← → Steer</span>
  </div>
  <button id="start">TAP TO START</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════
//  BUS RUSH 3D  —  Visual Upgrade Edition
// ═══════════════════════════════════════════════════════════════════

// ── SCENE / RENDERER ─────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.physicallyCorrectLights = true;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x8bbdd9, 0.008);

const camera = new THREE.PerspectiveCamera(58, innerWidth / innerHeight, 0.5, 350);
const clock = new THREE.Clock();

window.addEventListener('resize', () => {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
});

// ── TEXTURES (Canvas-based procedural) ───────────────────────────
function makeRoadTex(w, h) {
  const cv = document.createElement('canvas');
  cv.width = w; cv.height = h;
  const ctx = cv.getContext('2d');
  // Asphalt base
  ctx.fillStyle = '#2a2a2e';
  ctx.fillRect(0, 0, w, h);
  // Noise grain
  for (let i = 0; i < 3000; i++) {
    const v = Math.floor(Math.random() * 30 + 30);
    ctx.fillStyle = `rgba(${v},${v},${v},0.25)`;
    const x = Math.random() * w, y = Math.random() * h;
    ctx.fillRect(x, y, 2, 2);
  }
  // Dashed center line (yellow)
  ctx.strokeStyle = '#ddb700'; ctx.lineWidth = 4; ctx.setLineDash([18, 18]);
  ctx.beginPath(); ctx.moveTo(w / 2, 0); ctx.lineTo(w / 2, h); ctx.stroke();
  // Edge lines (white)
  ctx.strokeStyle = '#cccccc'; ctx.lineWidth = 3; ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(10, 0); ctx.lineTo(10, h); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(w - 10, 0); ctx.lineTo(w - 10, h); ctx.stroke();
  const t = new THREE.CanvasTexture(cv);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.repeat.set(1, 6);
  return t;
}

function makeBuildingTex(color, floors, cols) {
  const cv = document.createElement('canvas');
  cv.width = 256; cv.height = 512;
  const ctx = cv.getContext('2d');
  ctx.fillStyle = color;
  ctx.fillRect(0, 0, 256, 512);
  // Subtle gradient overlay
  const g = ctx.createLinearGradient(0, 0, 0, 512);
  g.addColorStop(0, 'rgba(255,255,255,0.06)');
  g.addColorStop(1, 'rgba(0,0,0,0.18)');
  ctx.fillStyle = g; ctx.fillRect(0, 0, 256, 512);
  // Windows
  const ww = Math.floor((256 - 20) / cols), fh = Math.floor(512 / floors);
  for (let r = 0; r < floors; r++) {
    for (let c = 0; c < cols; c++) {
      const lit = Math.random() > 0.35;
      ctx.fillStyle = lit ? `rgba(255,240,160,${0.5 + Math.random() * 0.5})` : 'rgba(30,50,70,0.8)';
      ctx.fillRect(12 + c * ww + 4, r * fh + 6, ww - 8, fh - 10);
      // Reflective edge
      if (lit) {
        ctx.fillStyle = 'rgba(255,255,200,0.2)';
        ctx.fillRect(12 + c * ww + 4, r * fh + 6, 3, fh - 10);
      }
    }
  }
  return new THREE.CanvasTexture(cv);
}

function makeSidewalkTex() {
  const cv = document.createElement('canvas');
  cv.width = 128; cv.height = 128;
  const ctx = cv.getContext('2d');
  ctx.fillStyle = '#9a9a9c';
  ctx.fillRect(0, 0, 128, 128);
  ctx.strokeStyle = '#7a7a7c'; ctx.lineWidth = 2;
  for (let x = 0; x < 128; x += 32) ctx.strokeRect(x, 0, 32, 128);
  for (let y = 0; y < 128; y += 32) ctx.strokeRect(0, y, 128, 32);
  const t = new THREE.CanvasTexture(cv);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.repeat.set(4, 4);
  return t;
}

const roadTexH = makeRoadTex(256, 512);
const roadTexV = makeRoadTex(512, 256);  // rotated usage
const sidewalkTex = makeSidewalkTex();

// ── LIGHTING ──────────────────────────────────────────────────────
const ambient = new THREE.HemisphereLight(0xc8dff5, 0x445533, 0.9);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xffe8c0, 2.2);
sun.position.set(80, 120, 60);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.near = 1; sun.shadow.camera.far = 320;
sun.shadow.camera.left = -130; sun.shadow.camera.right = 130;
sun.shadow.camera.top = 130; sun.shadow.camera.bottom = -130;
sun.shadow.bias = -0.0003;
scene.add(sun);

const rimLight = new THREE.DirectionalLight(0x4488ff, 0.4);
rimLight.position.set(-60, 30, -60);
scene.add(rimLight);

// ── SKY ───────────────────────────────────────────────────────────
(function buildSky() {
  const skyGeo = new THREE.SphereGeometry(280, 24, 12);
  const skyVerts = skyGeo.attributes.position;
  const colors = [];
  for (let i = 0; i < skyVerts.count; i++) {
    const y = skyVerts.getY(i);
    const t = Math.max(0, Math.min(1, (y + 280) / 560));
    // Gradient: horizon warm -> zenith deep blue
    const r = 0.46 + (1 - t) * 0.38;
    const g = 0.68 + (1 - t) * 0.18;
    const b = 0.88 - (1 - t) * 0.12;
    colors.push(r, g, b);
  }
  skyGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
  const skyMat = new THREE.MeshBasicMaterial({ vertexColors: true, side: THREE.BackSide });
  scene.add(new THREE.Mesh(skyGeo, skyMat));

  // Sun disc
  const sunMat = new THREE.MeshBasicMaterial({ color: 0xfff5b0 });
  const sunMesh = new THREE.Mesh(new THREE.CircleGeometry(6, 16), sunMat);
  sunMesh.position.set(80, 110, -200);
  scene.add(sunMesh);

  // Halo
  const haloMat = new THREE.MeshBasicMaterial({ color: 0xffeedd, transparent: true, opacity: 0.12 });
  const halo = new THREE.Mesh(new THREE.CircleGeometry(18, 16), haloMat);
  halo.position.copy(sunMesh.position);
  halo.position.z += 0.5;
  scene.add(halo);

  // Clouds
  const cloudMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 1, transparent: true, opacity: 0.85 });
  const cloudPositions = [
    [-60, 60, -120], [40, 80, -180], [120, 55, -100],
    [-130, 70, -60], [80, 90, 80], [-80, 65, 100]
  ];
  cloudPositions.forEach(([cx, cy, cz]) => {
    const cg = new THREE.Group();
    for (let i = 0; i < 4; i++) {
      const r = 8 + Math.random() * 10;
      const blob = new THREE.Mesh(new THREE.SphereGeometry(r, 7, 5), cloudMat);
      blob.position.set((Math.random() - .5) * 22, (Math.random() - .5) * 5, (Math.random() - .5) * 12);
      blob.scale.y = 0.5;
      cg.add(blob);
    }
    cg.position.set(cx, cy, cz);
    scene.add(cg);
  });
})();

// ── WORLD ─────────────────────────────────────────────────────────
const buildings = [];

function buildWorld() {
  // Ground
  const grassMat = new THREE.MeshStandardMaterial({ color: 0x4a7c4e, roughness: 0.95, metalness: 0 });
  const ground = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), grassMat);
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  // Sidewalks (slabs between road and blocks)
  const swMat = new THREE.MeshStandardMaterial({ map: sidewalkTex, roughness: 0.85, metalness: 0 });
  const swPositions = [
    {x:-37.5,z:-37.5,w:48,d:48},{x:7.5,z:-37.5,w:48,d:48},{x:52.5,z:-37.5,w:48,d:48},
    {x:-37.5,z:7.5,w:48,d:48}, {x:7.5,z:7.5,w:48,d:48}, {x:52.5,z:7.5,w:48,d:48},
    {x:-37.5,z:52.5,w:48,d:48},{x:7.5,z:52.5,w:48,d:48},{x:52.5,z:52.5,w:48,d:48},
  ];
  swPositions.forEach(s => {
    const sw = new THREE.Mesh(new THREE.PlaneGeometry(s.w, s.d), swMat);
    sw.rotation.x = -Math.PI / 2;
    sw.position.set(s.x, 0.02, s.z);
    sw.receiveShadow = true;
    scene.add(sw);
  });

  // Roads
  const roadMatH = new THREE.MeshStandardMaterial({ map: roadTexH, roughness: 0.92, metalness: 0.02 });
  const roadMatV = new THREE.MeshStandardMaterial({
    map: (() => { const t = makeRoadTex(256, 512); t.repeat.set(6, 1); return t; })(),
    roughness: 0.92, metalness: 0.02
  });

  const ROAD_W = 13;
  const roadZs = [-65, -10, 45];
  const roadXs = [-65, -10, 45];

  roadZs.forEach(z => {
    const mesh = new THREE.Mesh(new THREE.PlaneGeometry(220, ROAD_W), roadMatH);
    mesh.rotation.x = -Math.PI / 2;
    mesh.position.set(0, 0.03, z);
    mesh.receiveShadow = true;
    scene.add(mesh);
  });
  roadXs.forEach(x => {
    const mesh = new THREE.Mesh(new THREE.PlaneGeometry(ROAD_W, 220), roadMatV);
    mesh.rotation.x = -Math.PI / 2;
    mesh.position.set(x, 0.03, 0);
    mesh.receiveShadow = true;
    scene.add(mesh);
  });

  // Crosswalks
  const cwMat = new THREE.MeshStandardMaterial({ color: 0xe0e0e0, roughness: 0.9 });
  const cwPositions = [
    [-65,-65],[-10,-65],[45,-65],
    [-65,-10],[-10,-10],[45,-10],
    [-65,45], [-10,45], [45,45]
  ];
  cwPositions.forEach(([cx,cz]) => {
    for (let s = 0; s < 2; s++) {
      for (let i = 0; i < 5; i++) {
        const strip = new THREE.Mesh(new THREE.PlaneGeometry(s === 0 ? 1.2 : ROAD_W, s === 0 ? ROAD_W : 1.2), cwMat);
        strip.rotation.x = -Math.PI / 2;
        strip.position.set(
          s === 0 ? cx + (i * 2 - 4) : cx,
          0.05,
          s === 0 ? cz : cz + (i * 2 - 4)
        );
        scene.add(strip);
      }
    }
  });

  // City blocks
  const blockCenters = [
    [-37.5,-37.5],[7.5,-37.5],[52.5,-37.5],
    [-37.5,7.5],  [7.5,7.5],  [52.5,7.5],
    [-37.5,52.5], [7.5,52.5], [52.5,52.5],
  ];
  const palettes = [
    '#7a8fa8','#c4a882','#9a9aaa','#7b9e87','#c0a88e',
    '#8899bb','#a89888','#8899cc','#bb9988','#6688aa'
  ];
  blockCenters.forEach((center, ci) => {
    const [bx, bz] = center;
    const usedPos = [];
    const num = 3 + Math.floor(Math.random() * 3);
    for (let i = 0; i < num; i++) {
      const w = 7 + Math.random() * 9, d = 7 + Math.random() * 9, h = 10 + Math.random() * 28;
      let px, pz, tries = 0;
      do {
        px = bx + (Math.random() - .5) * 20;
        pz = bz + (Math.random() - .5) * 20;
        tries++;
      } while (tries < 20 && usedPos.some(u =>
        Math.abs(u.x - px) < (u.w + w) / 2 + 3 && Math.abs(u.z - pz) < (u.d + d) / 2 + 3
      ));
      usedPos.push({ x: px, z: pz, w, d });
      const col = palettes[(ci + i * 3) % palettes.length];
      const floors = Math.max(2, Math.round(h / 4));
      const cols = Math.max(2, Math.round(w / 4));
      addBuilding(px, h / 2, pz, w, h, d, col, floors, cols);
    }
    for (let t = 0; t < 2; t++) addTree(bx + (Math.random() - .5) * 16, bz + (Math.random() - .5) * 16);
  });

  // Street lights
  const lampPos = [
    [-65,20],[-65,-35],[-10,20],[-10,-35],[45,20],[45,-35],
    [-35,45],[10,45],[-35,-10],[10,-10],[-35,-65],[10,-65]
  ];
  lampPos.forEach(([lx, lz]) => addLamp(lx, lz));
}

function addBuilding(x, y, z, w, h, d, col, floors, cols) {

const particles = [];
const particleGeo = new THREE.PlaneGeometry(0.6, 0.6);
const particleMat = new THREE.MeshBasicMaterial({
  color: 0x888888, transparent: true, opacity: 0.55,
  depthWrite: false, side: THREE.DoubleSide
});

function spawnParticle() {
  const mesh = new THREE.Mesh(particleGeo, particleMat.clone());
  mesh.position.set(
    busGroup.position.x + Math.sin(busAngle) * -1.8 + (Math.random() - .5) * 0.5,
    0.55,
    busGroup.position.z + Math.cos(busAngle) * -1.8 + (Math.random() - .5) * 0.5
  );
  mesh.userData.vel = new THREE.Vector3(
    (Math.random() - .5) * 0.5,
    0.8 + Math.random() * 0.5,
    (Math.random() - .5) * 0.5
  );
  mesh.userData.life = 1;
  scene.add(mesh);
  particles.push(mesh);
}

let particleTimer = 0;
function updateParticles(dt) {
  particleTimer += dt;
  if (Math.abs(busSpeed) > 1 && particleTimer > 0.06) {
    spawnParticle();
    particleTimer = 0;
  }
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.userData.life -= dt * 0.9;
    p.userData.vel.y -= dt * 0.1;
    p.position.add(p.userData.vel.clone().multiplyScalar(dt));
    p.material.opacity = p.userData.life * 0.35;
    const s = 1 + (1 - p.userData.life) * 2;
    p.scale.setScalar(s);
    p.lookAt(camera.position);
    if (p.userData.life <= 0) {
      scene.remove(p);
      particles.splice(i, 1);
    }
  }
}

// ── PHYSICS STATE ─────────────────────────────────────────────────
let busPos   = new THREE.Vector3(0, 0, 60);
let busAngle = 0;
let busSpeed = 0;
const MAX_SPEED   = 22;
const ACCEL       = 14;
const FRICTION    = 8;
const BRAKE_F     = 22;
const STEER_RATE  = 1.8;
const BUS_RADIUS  = 4.8;
const WORLD_BOUND = 92;

// Camera lerp
const camPos    = new THREE.Vector3();
const camTarget = new THREE.Vector3();

// ── GAME STATE ────────────────────────────────────────────────────
let score = 0, passengers = 0;
const MAX_PAX = 24;
let targetStop = 0;
const visitedStops = new Set();
let dockedTimer = 0, isDocked = false;
const DOCK_TIME = 1.0;
let gameStarted = false;
let t = 0; // global time

// ── CONTROLS ──────────────────────────────────────────────────────
const keys = { gas: false, brake: false, left: false, right: false };

function initControls() {
  const map = { bl: 'left', br: 'right', bg: 'gas', bb: 'brake' };
  Object.entries(map).forEach(([id, key]) => {
    const el = document.getElementById(id);
    const on  = e => { e.preventDefault(); keys[key] = true;  el.classList.add('p'); };
    const off = e => { e.preventDefault(); keys[key] = false; el.classList.remove('p'); };
    el.addEventListener('touchstart',  on,  { passive: false });
    el.addEventListener('touchend',    off, { passive: false });
    el.addEventListener('touchcancel', off, { passive: false });
    el.addEventListener('mousedown', on); el.addEventListener('mouseup', off);
    el.addEventListener('mouseleave', off);
  });
  window.addEventListener('keydown', e => {
    if (e.code==='ArrowUp'  ||e.code==='KeyW') keys.gas  =true;
    if (e.code==='ArrowDown'||e.code==='KeyS') keys.brake=true;
    if (e.code==='ArrowLeft'||e.code==='KeyA') keys.left =true;
    if (e.code==='ArrowRight'||e.code==='KeyD') keys.right=true;
  });
  window.addEventListener('keyup', e => {
    if (e.code==='ArrowUp'  ||e.code==='KeyW') keys.gas  =false;
    if (e.code==='ArrowDown'||e.code==='KeyS') keys.brake=false;
    if (e.code==='ArrowLeft'||e.code==='KeyA') keys.left =false;
    if (e.code==='ArrowRight'||e.code==='KeyD') keys.right=false;
  });
  document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
}

// ── PHYSICS UPDATE ────────────────────────────────────────────────
function updateBus(dt) {
  // Steering
  const steerMult = Math.min(Math.abs(busSpeed) / MAX_SPEED * 2 + 0.3, 1);
  if (keys.left)  busAngle -= STEER_RATE * steerMult * dt;
  if (keys.right) busAngle += STEER_RATE * steerMult * dt;

  // Throttle
  if (keys.gas) {
    busSpeed = Math.min(busSpeed + ACCEL * dt, MAX_SPEED);
  } else if (keys.brake) {
    if (busSpeed > 0.2)          busSpeed -= BRAKE_F * dt;
    else if (busSpeed > -MAX_SPEED * 0.3) busSpeed -= BRAKE_F * 0.4 * dt;
  } else {
    if (Math.abs(busSpeed) < 0.15) busSpeed = 0;
    else busSpeed -= FRICTION * Math.sign(busSpeed) * dt;
  }

  // Brake lights
  if (bus.userData.brakeLights) {
    bus.userData.brakeLights.visible = keys.brake && busSpeed > 0.5;
  }

  // Move
  const nx = busPos.x + Math.sin(busAngle) * busSpeed * dt;
  const nz = busPos.z + Math.cos(busAngle) * busSpeed * dt;

  const cx = Math.max(-WORLD_BOUND, Math.min(WORLD_BOUND, nx));
  const cz = Math.max(-WORLD_BOUND, Math.min(WORLD_BOUND, nz));
  if (cx !== nx || cz !== nz) busSpeed *= -0.25;

  // Building collision
  for (const b of buildings) {
    const dx = cx - b.x, dz = cz - b.z;
    if (Math.abs(dx) < b.hw + BUS_RADIUS && Math.abs(dz) < b.hd + BUS_RADIUS) {
      const ox = b.hw + BUS_RADIUS - Math.abs(dx);
      const oz = b.hd + BUS_RADIUS - Math.abs(dz);
      if (ox < oz) { busPos.x = b.x + (b.hw + BUS_RADIUS) * Math.sign(dx); }
      else          { busPos.z = b.z + (b.hd + BUS_RADIUS) * Math.sign(dz); }
      busSpeed *= 0.08;
      break;
    }
  }
  busPos.set(cx, 0, cz);

  // Apply to mesh
  busGroup.position.set(busPos.x, 0, busPos.z);
  busGroup.rotation.y = -busAngle;

  // Spin wheels
  bus.children.forEach(c => {
    if (c.geometry && c.geometry.type === 'CylinderGeometry' && c.position.y < 1)
      c.rotation.x += busSpeed * dt * 1.4;
  });

  // Bus bob
  busGroup.position.y = Math.sin(t * 8) * Math.abs(busSpeed) * 0.003;
}

// ── CAMERA UPDATE ─────────────────────────────────────────────────
function updateCamera(dt) {
  const fd = 19, fh = 8.5;
  const tx = busPos.x - Math.sin(busAngle) * fd;
  const tz = busPos.z - Math.cos(busAngle) * fd;
  camPos.x += (tx - camPos.x) * Math.min(dt * 6, 1);
  camPos.y += (fh - camPos.y) * Math.min(dt * 5, 1);
  camPos.z += (tz - camPos.z) * Math.min(dt * 6, 1);
  const lx = busPos.x + Math.sin(busAngle) * 5;
  const lz = busPos.z + Math.cos(busAngle) * 5;
  camTarget.x += (lx - camTarget.x) * Math.min(dt * 9, 1);
  camTarget.y += (1.5 - camTarget.y) * Math.min(dt * 9, 1);
  camTarget.z += (lz - camTarget.z) * Math.min(dt * 9, 1);
  camera.position.copy(camPos);
  camera.lookAt(camTarget);
}

// ── GAME LOGIC ────────────────────────────────────────────────────
function updateGame(dt) {
  t += dt;

  // Animate beacons
  stops.forEach((s, i) => {
    s.beacon.position.y = 10 + Math.sin(t * 2 + i) * 0.6;
    s.beacon.rotation.z = t * 1.5;
    if (i === targetStop) {
      s.beaconMat.opacity = 0.7 + Math.sin(t * 4) * 0.25;
      s.glowMat.opacity = 0.15 + Math.sin(t * 3) * 0.08;
    }
  });

  // Dock detection
  const target = stops[targetStop];
  const dx = busPos.x - target.pos.x;
  const dz = busPos.z - target.pos.z;
  const dist = Math.sqrt(dx * dx + dz * dz);

  if (dist < 10 && Math.abs(busSpeed) < 3) {
    dockedTimer += dt;
    document.getElementById('dock-ring').style.opacity = (dockedTimer / DOCK_TIME) * 0.8;
    if (dockedTimer >= DOCK_TIME && !isDocked) {
      isDocked = true;
      dock();
    }
  } else {
    dockedTimer = 0;
    isDocked = false;
    document.getElementById('dock-ring').style.opacity = 0;
  }
}

function dock() {
  const name = stopNames[targetStop];
  if (passengers > 0) {
    const off = Math.ceil(passengers * (0.4 + Math.random() * 0.4));
    const earn = off * 5;
    score += earn;
    passengers -= off;
    toast(`🚪 ${off} dropped off · +$${earn}`);
  }
  setTimeout(() => {
    const space = MAX_PAX - passengers;
    const on = Math.min(Math.floor(2 + Math.random() * 6), space);
    if (on > 0) { passengers += on; toast(`👤 ${on} boarded`); }
    visitedStops.add(targetStop);
    if (visitedStops.size === 6) visitedStops.clear();
    targetStop = (targetStop + 1) % 6;
    updateBeacons();
    updateDots();
    isDocked = false; dockedTimer = 0;
    document.getElementById('dock-ring').style.opacity = 0;
  }, 900);
}

// ── HUD ───────────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('sc-v').textContent = '$' + score;
  document.getElementById('px-v').textContent = passengers + '/24';
  document.getElementById('spd-v').textContent = Math.abs(Math.round(busSpeed * 3.6));

  const tgt = stops[targetStop];
  const dx = tgt.pos.x - busPos.x, dz = tgt.pos.z - busPos.z;
  const dist = Math.round(Math.sqrt(dx * dx + dz * dz));
  document.getElementById('nav-s').textContent = '→ STOP ' + stopNames[targetStop];
  document.getElementById('nav-d').textContent = dist + ' m';
  const worldAngle = Math.atan2(dx, dz);
  const compassDeg = (worldAngle - busAngle) * 180 / Math.PI;
  document.getElementById('nav-c').style.transform = `rotate(${compassDeg}deg)`;
}

function updateDots() {
  for (let i = 0; i < 6; i++) {
    const d = document.getElementById('d' + i);
    d.classList.remove('active', 'done');
    if (i === targetStop) d.classList.add('active');
    else if (visitedStops.has(i)) d.classList.add('done');
  }
}

function toast(msg) {
  const c = document.getElementById('toast');
  const el = document.createElement('div');
  el.className = 't'; el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => el.parentNode && el.parentNode.removeChild(el), 2100);
}

// ── GAME LOOP ─────────────────────────────────────────────────────
function loop() {
  requestAnimationFrame(loop);
  if (!gameStarted) return;
  const dt = Math.min(clock.getDelta(), 0.05);
  updateBus(dt);
  updateCamera(dt);
  updateGame(dt);
  updateParticles(dt);
  updateHUD();
  renderer.render(scene, camera);
}

// ── START ─────────────────────────────────────────────────────────
function startGame() {
  document.getElementById('ov').style.display = 'none';
  gameStarted = true;
  clock.start();
  camPos.set(busPos.x - Math.sin(busAngle) * 19, 8.5, busPos.z - Math.cos(busAngle) * 19);
  camTarget.copy(busPos);
  toast('🚌 Drive to Stop A!');
}

document.getElementById('start').addEventListener('click', startGame);
document.getElementById('ov').addEventListener('touchend', e => {
  if (e.target === document.getElementById('start') || e.target === document.getElementById('ov')) startGame();
});

// ── INIT ──────────────────────────────────────────────────────────
buildWorld();
buildBus();
buildStops();
initControls();
busGroup.position.copy(busPos);
loop();
</script>
</body>
